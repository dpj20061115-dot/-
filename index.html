<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 学习助手 v2</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fefaf3;--bg-card:#fffef9;--text:#2c2416;--text-secondary:#6b5e4a;
  --primary:#3a5a8c;--primary-light:#e8eff7;--primary-dark:#2a4570;
  --accent-red:#c0392b;--accent-orange:#d4780a;--accent-blue:#2471a3;
  --accent-green:#1e7e34;--accent-purple:#6c3483;
  --border:#e0d7c6;--shadow:0 2px 8px rgba(44,36,22,.08);
  --radius:12px;--radius-sm:8px;
  --font:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1b15;--bg-card:#28241c;--text:#e8dfcd;--text-secondary:#b5a68e;
    --primary:#6b9fd4;--primary-light:#2a3545;--primary-dark:#8ab4e0;
    --border:#3d3528;--shadow:0 2px 8px rgba(0,0,0,.3);}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
.header{background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-title{font-size:1.2rem;font-weight:700;white-space:nowrap;}
.header select,.header button{font-size:.85rem;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-family:var(--font);}
.header button{background:var(--primary);color:#fff;border:none;font-weight:600;white-space:nowrap;}
.header button.outline{background:transparent;color:var(--primary);border:1px solid var(--primary);}
.header button:hover{opacity:.85;}
.header-spacer{flex:1;}
.tab-nav{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:52px;z-index:99;}
.tab-btn{padding:10px 14px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.85rem;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s;font-family:var(--font);min-width:44px;min-height:44px;display:flex;align-items:center;gap:5px;}
.tab-btn:hover{color:var(--primary);background:var(--primary-light);}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.main{padding:16px;max-width:1200px;margin:0 auto;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.card-title{font-weight:700;font-size:1rem;}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;margin:2px;}
.tag-red{background:#fde8e8;color:var(--accent-red);}
.tag-orange{background:#fef3e0;color:var(--accent-orange);}
.tag-blue{background:#e3f0fa;color:var(--accent-blue);}
.tag-green{background:#e6f4ea;color:var(--accent-green);}
.tag-purple{background:#f0e6f5;color:var(--accent-purple);}
.tag-gray{background:#f0ede5;color:var(--text-secondary);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:.2s;font-family:var(--font);min-height:40px;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-outline{background:transparent;color:var(--primary);border:1px solid var(--primary);}
.btn-outline:hover{background:var(--primary-light);}
.btn-danger{background:transparent;color:var(--accent-red);border:1px solid var(--accent-red);}
.btn-danger:hover{background:#fde8e8;}
.btn-sm{padding:5px 10px;font-size:.75rem;min-height:32px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-weight:600;margin-bottom:4px;font-size:.82rem;color:var(--text-secondary);}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;font-family:var(--font);background:var(--bg);color:var(--text);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-row .form-group{flex:1;min-width:120px;}
.checkbox-item{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.82rem;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:flex-start;padding:20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg-card);border-radius:var(--radius);padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-header{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-secondary);padding:8px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.stars{display:inline-flex;gap:3px;cursor:pointer;}
.two-col{display:flex;gap:16px;}
.col-side{flex:0 0 280px;}
.col-main{flex:1;min-width:0;}
.tree-item{padding:8px 12px;cursor:pointer;border-radius:6px;font-size:.85rem;margin:2px 0;}
.tree-item:hover{background:var(--primary-light);}
.tree-item.active{background:var(--primary-light);color:var(--primary);font-weight:700;}
.tree-children{margin-left:20px;display:none;}
.tree-children.open{display:block;}
.tree-toggle{font-size:.7rem;display:inline-block;width:16px;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.stat-card{flex:1;min-width:80px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.stat-num{font-size:1.4rem;font-weight:700;color:var(--primary);}
.stat-label{font-size:.72rem;color:var(--text-secondary);}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;background:var(--bg);color:var(--text);}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:2px 0;}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;}
.empty-state{text-align:center;padding:30px;color:var(--text-secondary);}
.empty-icon{font-size:3rem;}
.highlight-red{color:var(--accent-red);font-weight:600;}
.highlight-green{color:var(--accent-green);font-weight:600;}
.text-secondary{color:var(--text-secondary);font-size:.8rem;}
.section-title{font-size:1.05rem;font-weight:700;margin-bottom:10px;}
.mt-8{margin-top:8px;}.mb-8{margin-bottom:8px;}.gap-8{gap:8px;}
.toast-container{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;color:#fff;animation:slideIn .3s;}
.toast-info{background:var(--primary);}.toast-success{background:var(--accent-green);}.toast-error{background:var(--accent-red);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;justify-content:center;align-items:center;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:var(--bg-card);border-radius:var(--radius);padding:24px;max-width:400px;width:90%;text-align:center;}
.confirm-btns{display:flex;gap:10px;justify-content:center;margin-top:16px;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);z-index:100;}
.bottom-tabs{display:flex;overflow-x:auto;}
.bottom-tab{flex:1;min-width:50px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.6rem;font-family:var(--font);min-height:48px;}
.bottom-tab.active{color:var(--primary);font-weight:700;}
.btab-icon{font-size:1.1rem;}
.fab{display:none;position:fixed;bottom:70px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;font-size:1.5rem;border:none;cursor:pointer;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.25);align-items:center;justify-content:center;}
.fab:active{transform:scale(.92);}
.guide-card{background:linear-gradient(135deg,#e8eff7 0%,#f0e6f5 100%);border:2px solid var(--primary);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
.guide-card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;font-weight:700;color:var(--primary);}
.guide-card-body{padding:0 16px 16px;display:none;}
.guide-card-body.open{display:block;}
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.guide-item{background:var(--bg-card);border-radius:var(--radius-sm);padding:10px;box-shadow:var(--shadow);}
.guide-item .guide-name{font-weight:700;font-size:.85rem;}
.guide-item .guide-desc{font-size:.75rem;color:var(--text-secondary);margin-top:2px;line-height:1.4;}
.guide-steps{font-size:.82rem;line-height:1.8;}
@media(prefers-color-scheme:dark){.guide-card{background:linear-gradient(135deg,#2a3545 0%,#3a2a45 100%);}}
.file-uploader{margin:8px 0;}
.file-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.file-item{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:.8rem;}
.file-item .file-icon{font-size:1.2rem;}
.file-item .file-info{flex:1;min-width:0;}
.file-item .file-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item .file-size{font-size:.7rem;color:var(--text-secondary);}
.file-item .file-preview-img{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.file-remove-btn{background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:1rem;padding:4px;border-radius:50%;}
.file-remove-btn:hover{background:#fde8e8;}
.file-upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:2px dashed var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.82rem;color:var(--text-secondary);min-height:44px;}
.file-upload-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.file-upload-btn input[type=file]{display:none;}
.flashcard-container{perspective:1000px;width:100%;max-width:500px;height:260px;margin:20px auto;cursor:pointer;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flashcard-inner.flipped{transform:rotateY(180deg);}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-size:1.1rem;border:2px solid var(--border);}
.flashcard-front{background:var(--bg-card);}
.flashcard-back{background:var(--primary-light);transform:rotateY(180deg);}
.practice-setup{max-width:600px;margin:0 auto;}
.practice-setup .source-checkboxes{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.practice-setup .source-checkboxes label{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.82rem;font-weight:600;}
.practice-setup .source-checkboxes label.checked{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.practice-timer{text-align:center;font-size:1.4rem;font-weight:700;padding:8px;}
.practice-progress{display:flex;align-items:center;gap:8px;margin:8px 0;}
.practice-progress-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.practice-progress-fill{height:100%;background:var(--primary);transition:width .3s;}
.practice-question-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin:12px 0;}
.practice-question-card.correct{border-color:var(--accent-green);background:#e6f4ea;}
.practice-question-card.wrong{border-color:var(--accent-red);background:#fde8e8;}
.practice-q-meta{font-size:.78rem;color:var(--text-secondary);margin-bottom:8px;}
.practice-q-content{font-size:1.05rem;font-weight:600;margin-bottom:12px;line-height:1.6;}
.practice-options{display:flex;flex-direction:column;gap:6px;}
.practice-option{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.9rem;}
.practice-option:hover{border-color:var(--primary);background:var(--primary-light);}
.practice-option.selected{border-color:var(--primary);background:var(--primary-light);font-weight:700;}
.practice-option.correct-answer{border-color:var(--accent-green);background:#e6f4ea;font-weight:700;}
.practice-option.wrong-answer{border-color:var(--accent-red);background:#fde8e8;}
.practice-result{text-align:center;}
.practice-result .score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:2rem;font-weight:700;}
.score-excellent{border:4px solid var(--accent-green);color:var(--accent-green);}
.score-good{border:4px solid var(--accent-blue);color:var(--accent-blue);}
.score-ok{border:4px solid var(--accent-orange);color:var(--accent-orange);}
.score-bad{border:4px solid var(--accent-red);color:var(--accent-red);}
.practice-result-detail{font-size:.9rem;line-height:2;}
.hidden{display:none !important;}
@media(max-width:767px){
  .header{padding:6px 10px;}
  .header-title{font-size:1rem;}
  .tab-nav.desktop-tabs{display:none;}
  .bottom-nav{display:block;}
  .fab{display:flex;}
  .main{padding:10px;padding-bottom:80px;}
  .modal{max-width:100%;border-radius:var(--radius) var(--radius) 0 0;max-height:100vh;}
  .two-col{flex-direction:column;}
  .col-side{flex:auto;}
  .flashcard-container{height:200px;}
}
@media(min-width:768px){.bottom-nav{display:none;}.tab-nav.desktop-tabs{display:flex;}}
@media(min-width:768px) and (max-width:1024px){.two-col{flex-direction:column;}.col-side{flex:auto;}}
</style>
</head>
<body>

<div class="header">
  <span class="header-title">📖 学习助手</span>
  <select id="globalSemester" onchange="switchSemester()"></select>
  <button class="outline" onclick="openSemesterModal()">⚙️ 学期管理</button>
  <span class="header-spacer"></span>
  <button class="outline" onclick="exportData()">📥 导出</button>
  <button class="outline" onclick="document.getElementById('importFile').click()">📤 导入</button>
  <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none">
</div>

<div class="tab-nav desktop-tabs" id="desktopTabs">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 总览</button>
  <button class="tab-btn" data-tab="chapters" onclick="switchTab('chapters')">📚 章节</button>
  <button class="tab-btn" data-tab="examQuestions" onclick="switchTab('examQuestions')">📋 真题</button>
  <button class="tab-btn" data-tab="examPapers" onclick="switchTab('examPapers')">📑 试卷</button>
  <button class="tab-btn" data-tab="wrongAnswers" onclick="switchTab('wrongAnswers')">📝 错题</button>
  <button class="tab-btn" data-tab="assignments" onclick="switchTab('assignments')">📎 作业</button>
  <button class="tab-btn" data-tab="flashcards" onclick="switchTab('flashcards')">🃏 闪卡</button>
  <button class="tab-btn" data-tab="knowledgeBase" onclick="switchTab('knowledgeBase')">🧠 知识库</button>
  <button class="tab-btn" data-tab="practice" onclick="switchTab('practice')">✍️ 刷题</button>
  <button class="tab-btn" data-tab="exams" onclick="switchTab('exams')">📅 考试</button>
</div>

<div class="main" id="mainContent"></div>

<div class="bottom-nav" id="bottomNav">
  <div class="bottom-tabs">
    <button class="bottom-tab active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="btab-icon">📊</span>总览</button>
    <button class="bottom-tab" data-tab="chapters" onclick="switchTab('chapters')"><span class="btab-icon">📚</span>章节</button>
    <button class="bottom-tab" data-tab="examQuestions" onclick="switchTab('examQuestions')"><span class="btab-icon">📋</span>真题</button>
    <button class="bottom-tab" data-tab="examPapers" onclick="switchTab('examPapers')"><span class="btab-icon">📑</span>试卷</button>
    <button class="bottom-tab" data-tab="wrongAnswers" onclick="switchTab('wrongAnswers')"><span class="btab-icon">📝</span>错题</button>
    <button class="bottom-tab" data-tab="flashcards" onclick="switchTab('flashcards')"><span class="btab-icon">🃏</span>闪卡</button>
    <button class="bottom-tab" data-tab="knowledgeBase" onclick="switchTab('knowledgeBase')"><span class="btab-icon">🧠</span>知识库</button>
    <button class="bottom-tab" data-tab="practice" onclick="switchTab('practice')"><span class="btab-icon">✍️</span>刷题</button>
    <button class="bottom-tab" data-tab="exams" onclick="switchTab('exams')"><span class="btab-icon">📅</span>考试</button>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="fabAction()">＋</button>

<div class="toast-container" id="toastContainer"></div>
<div class="modal-overlay" id="globalModalOverlay"><div class="modal" id="globalModal"></div></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="modal-header" id="confirmTitle"></div>
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirmBtn">确认</button>
    </div>
  </div>
</div>

<script>
// ==================== Utilities ====================
function genId(){return 'id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);}
function today(){return new Date().toISOString().split('T')[0];}
function daysBetween(d1,d2){return Math.ceil((new Date(d2)-new Date(d1))/(86400000));}
function escapeHtml(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ==================== Toast ====================
function showToast(msg,type){
  type=type||'info';
  var c=document.getElementById('toastContainer');
  var t=document.createElement('div');
  t.className='toast toast-'+type;t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);
}

// ==================== Data Layer ====================
var KEYS={
  semesters:'lh_semesters',subjects:'lh_subjects',examQuestions:'lh_examQuestions',
  examPapers:'lh_examPapers',wrongAnswers:'lh_wrongAnswers',knowledgeBase:'lh_knowledgeBase',
  assignments:'lh_assignments',flashcards:'lh_flashcards',exams:'lh_exams',
  currentSemester:'lh_currentSemester',currentTab:'lh_currentTab',guideHidden:'lh_guide_hidden'
};

function loadData(key,def){
  if(def===undefined)def=[];
  try{var d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}
}
function saveData(key,data){
  try{localStorage.setItem(key,JSON.stringify(data));}catch(e){showToast('存储空间不足！请导出备份后清理数据','error');}
}

var currentTab='dashboard';
var currentSemesterId=loadData(KEYS.currentSemester,'');
var semesters=loadData(KEYS.semesters);
var subjects=loadData(KEYS.subjects);
var examQuestions=loadData(KEYS.examQuestions);
var examPapers=loadData(KEYS.examPapers);
var wrongAnswers=loadData(KEYS.wrongAnswers);
var knowledgeBase=loadData(KEYS.knowledgeBase);
var assignments=loadData(KEYS.assignments);
var flashcards=loadData(KEYS.flashcards);
var exams=loadData(KEYS.exams);

// ==================== Semester ====================
function getCurrentSemesterId(){
  if(!currentSemesterId&&semesters.length>0){
    currentSemesterId=semesters.find(function(s){return s.isCurrent;})?.id||semesters[0].id;
    saveData(KEYS.currentSemester,currentSemesterId);
  }
  if(!currentSemesterId&&semesters.length===0){
    var s={id:genId(),name:'默认学期',startDate:'2026-01',endDate:'2026-07',isCurrent:true};
    semesters=[s];saveData(KEYS.semesters,semesters);
    currentSemesterId=s.id;saveData(KEYS.currentSemester,currentSemesterId);
  }
  return currentSemesterId;
}

function switchSemester(){
  currentSemesterId=document.getElementById('globalSemester').value;
  saveData(KEYS.currentSemester,currentSemesterId);
  semesters=semesters.map(function(s){s.isCurrent=s.id===currentSemesterId;return s;});
  saveData(KEYS.semesters,semesters);
  refreshCurrentTab();
}

function updateSemesterSelect(){
  var sel=document.getElementById('globalSemester');
  if(!sel)return;
  var sid=getCurrentSemesterId();
  sel.innerHTML=semesters.map(function(s){
    return '<option value="'+s.id+'" '+(s.id===sid?'selected':'')+'>'+escapeHtml(s.name)+(s.isCurrent?' ✅':'')+'</option>';
  }).join('');
}

function openSemesterModal(){

function getCurrentSubjects(){
  var sid=getCurrentSemesterId();
  return subjects.filter(function(s){return s.semesterId===sid;});
}
function getSubjectById(id){return subjects.find(function(s){return s.id===id;});}
function getChapterById(subject,chapterId){return subject?.chapters?.find(function(c){return c.id===chapterId;});}
function getKnowledgePointById(kpId){
  for(var i=0;i<subjects.length;i++){
    var s=subjects[i];
    for(var j=0;j<(s.chapters||[]).length;j++){
      var c=s.chapters[j];
      for(var k=0;k<(c.knowledgePoints||[]).length;k++){
        if(c.knowledgePoints[k].id===kpId)return c.knowledgePoints[k];
      }
    }
  }
  return null;
}
function getAllKnowledgePoints(semesterFilter){
  if(semesterFilter===undefined)semesterFilter=true;
  var subs=semesterFilter?getCurrentSubjects():subjects;
  var kps=[];
  for(var i=0;i<subs.length;i++){
    var s=subs[i];
    for(var j=0;j<(s.chapters||[]).length;j++){
      var c=s.chapters[j];
      for(var k=0;k<(c.knowledgePoints||[]).length;k++){
        var kp=c.knowledgePoints[k];
        kps.push({
          id:kp.id,content:kp.content,tags:kp.tags,notes:kp.notes,
          mastered:kp.mastered,masteryLevel:kp.masteryLevel,
          textbookRef:kp.textbookRef,materialRef:kp.materialRef,
          examFrequency:kp.examFrequency,
          linkedExamQuestionIds:kp.linkedExamQuestionIds,
          linkedExamPaperQuestionIds:kp.linkedExamPaperQuestionIds,
          linkedFlashcardId:kp.linkedFlashcardId,
          attachmentIds:kp.attachmentIds,
          subjectName:s.name,subjectId:s.id,chapterTitle:c.title,chapterId:c.id
        });
      }
    }
  }
  return kps;
}

function updateExamFrequency(){
  var freq={};
  for(var i=0;i<examQuestions.length;i++){
    var eq=examQuestions[i];
    for(var j=0;j<(eq.linkedKnowledgePointIds||[]).length;j++){
      var kpid=eq.linkedKnowledgePointIds[j];
      freq[kpid]=(freq[kpid]||0)+1;
    }
  }
  for(var i=0;i<examPapers.length;i++){
    var ep=examPapers[i];
    for(var j=0;j<(ep.questions||[]).length;j++){
      var q=ep.questions[j];
      for(var k=0;k<(q.linkedKnowledgePointIds||[]).length;k++){
        var kpid=q.linkedKnowledgePointIds[k];
        freq[kpid]=(freq[kpid]||0)+1;
      }
    }
  }
  for(var i=0;i<subjects.length;i++){
    var s=subjects[i];
    for(var j=0;j<(s.chapters||[]).length;j++){
      var c=s.chapters[j];
      for(var k=0;k<(c.knowledgePoints||[]).length;k++){
        var kp=c.knowledgePoints[k];
        kp.examFrequency=freq[kp.id]||0;
        if(kp.examFrequency>=3&&!kp.tags.includes('高频考点'))kp.tags.push('高频考点');
      }
    }
  }
  saveData(KEYS.subjects,subjects);
}

// ==================== IndexedDB File Storage ====================
var FILE_DB_NAME='StudyAssistantFiles';
var FILE_STORE='files';
var fileDB=null;

function initFileDB(){
  return new Promise(function(resolve){
    var req=indexedDB.open(FILE_DB_NAME,1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(FILE_STORE)){
        var store=db.createObjectStore(FILE_STORE,{keyPath:'id'});
        store.createIndex('parentId','parentId',{unique:false});
      }
    };
    req.onsuccess=function(e){fileDB=e.target.result;resolve(fileDB);};
    req.onerror=function(){fileDB=null;resolve(null);};
  });
}

function fileStore(mode){
  if(!fileDB)return null;
  try{return fileDB.transaction([FILE_STORE],mode||'readonly').objectStore(FILE_STORE);}catch(e){return null;}
}

function storeFiles(fileList,parentId){
  return new Promise(function(resolve){
    var results=[];var processed=0;
    if(!fileList||fileList.length===0){resolve(results);return;}
    Array.from(fileList).forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        var fd={id:genId(),parentId:parentId,name:file.name,type:file.type,size:file.size,data:e.target.result,uploadedAt:today()};
        var store=fileStore('readwrite');
        if(!store){results.push(fd);processed++;if(processed===fileList.length)resolve(results);return;}
        var req=store.add(fd);
        req.onsuccess=function(){results.push(fd);processed++;if(processed===fileList.length)resolve(results);};
        req.onerror=function(){results.push({error:true});processed++;if(processed===fileList.length)resolve(results);};
      };
      reader.onerror=function(){processed++;if(processed===fileList.length)resolve(results);};
      reader.readAsDataURL(file);
    });
  });
}

function getFilesForParent(parentId){
  return new Promise(function(resolve){
    var store=fileStore();if(!store){resolve([]);return;}
    var idx=store.index('parentId');var req=idx.getAll(parentId);
    req.onsuccess=function(){resolve(req.result||[]);};
    req.onerror=function(){resolve([]);};
  });
}

function deleteFileFromDB(fileId){
  return new Promise(function(resolve){
    var store=fileStore('readwrite');if(!store){resolve(false);return;}
    var req=store.delete(fileId);
    req.onsuccess=function(){resolve(true);};
    req.onerror=function(){resolve(false);};
  });
}

function deleteFilesForParent(parentId){
  return new Promise(function(resolve){
    var store=fileStore('readwrite');if(!store){resolve(0);return;}
    var idx=store.index('parentId');var req=idx.getAllKeys(parentId);
    req.onsuccess=function(){
      var keys=req.result||[];var count=0;
      if(keys.length===0){resolve(0);return;}
      keys.forEach(function(k){
        var dr=store.delete(k);
        dr.onsuccess=function(){count++;if(count===keys.length)resolve(count);};
        dr.onerror=function(){count++;if(count===keys.length)resolve(count);};
      });
    };
    req.onerror=function(){resolve(0);};
  });
}

function renderFileItemHTML(f){
  var isImage=f.type&&f.type.startsWith('image/');
  var sizeStr=f.size>1024*1024?(f.size/(1024*1024)).toFixed(1)+' MB':f.size>1024?Math.round(f.size/1024)+' KB':f.size+' B';
  var icon='📄';
  if(isImage)icon='🖼️';
  else if(f.type&&f.type.includes('pdf'))icon='📕';
  else if(f.type&&f.type.includes('word'))icon='📝';
  var previewHTML=isImage?'<img class="file-preview-img" src="'+(f.data||'')+'" alt="">':'';
  return '<div class="file-item" id="fileItem_'+f.id+'">'+
    (previewHTML||'<span class="file-icon">'+icon+'</span>')+
    '<div class="file-info"><div class="file-name" title="'+escapeHtml(f.name)+'">'+escapeHtml(f.name)+'</div>'+
    '<div class="file-size">'+sizeStr+'</div></div>'+
    '<button class="file-remove-btn" onclick="removeUploadedFile(\''+f.id+'\',\''+f.parentId+'\')" title="移除">✕</button></div>';
}

function renderFileUploaderHTML(parentId,existingIds){
  return getFilesForParentRefs(existingIds||[]).then(function(files){
    var itemsHTML=files.map(function(f){return renderFileItemHTML(f);}).join('');
    return '<div class="file-uploader" id="fileUploader_'+parentId+'">'+
      '<div class="file-list" id="fileList_'+parentId+'">'+itemsHTML+'</div>'+
      '<label class="file-upload-btn">📎 上传文件（可多选）'+
      '<input type="file" multiple onchange="handleFileUpload(this,\''+parentId+'\')"></label>'+
      '<div class="text-secondary" style="font-size:.72rem;margin-top:2px;">支持图片、PDF、Word等，每次可多选</div></div>';
  });
}

function getFilesForParentRefs(ids){
  return new Promise(function(resolve){
    if(!ids||ids.length===0){resolve([]);return;}
    var store=fileStore();if(!store){resolve([]);return;}
    var files=[];var processed=0;
    ids.forEach(function(fid){
      var req=store.get(fid);
      req.onsuccess=function(){if(req.result)files.push(req.result);processed++;if(processed===ids.length)resolve(files);};
      req.onerror=function(){processed++;if(processed===ids.length)resolve(files);};
    });
  });
}

function handleFileUpload(inputEl,parentId){
  if(!inputEl.files||inputEl.files.length===0)return;
  showToast('正在上传 '+inputEl.files.length+' 个文件...','info');
  storeFiles(inputEl.files,parentId).then(function(newFiles){
    var listEl=document.getElementById('fileList_'+parentId);
    if(listEl){
      newFiles.forEach(function(f){
        if(!f.error)listEl.insertAdjacentHTML('beforeend',renderFileItemHTML(f));
      });
    }
    inputEl.value='';
    updateAttachmentIdsInput(parentId);
    var okCount=newFiles.filter(function(f){return !f.error;}).length;
    showToast('✅ 已上传 '+okCount+' 个文件','success');
  });
}

function removeUploadedFile(fileId,parentId){
  deleteFileFromDB(fileId).then(function(){
    var itemEl=document.getElementById('fileItem_'+fileId);
    if(itemEl)itemEl.remove();
    updateAttachmentIdsInput(parentId);
  });
}

function updateAttachmentIdsInput(parentId){
  getFilesForParent(parentId).then(function(files){
    var ids=files.map(function(f){return f.id;});
    var inputEl=document.getElementById('attachmentIds_'+parentId);
    if(inputEl)inputEl.value=JSON.stringify(ids);
  });
}

function fileUploaderFormHTML(parentId,existingIds){
  return '<div class="form-group"><label>附件</label>'+
    '<div id="fileUploaderContainer_'+parentId+'"></div>'+
    '<input type="hidden" id="attachmentIds_'+parentId+'" value=\''+JSON.stringify(existingIds||[])+'\'></div>';
}

function initFileUploader(parentId,existingIds){
  var container=document.getElementById('fileUploaderContainer_'+parentId);
  if(container){
    renderFileUploaderHTML(parentId,existingIds).then(function(html){
      container.innerHTML=html;
    });
  }
}

function getAttachmentIdsFromForm(parentId){
  var inputEl=document.getElementById('attachmentIds_'+parentId);
  if(!inputEl)return[];
  try{return JSON.parse(inputEl.value);}catch(e){return[];}
}

function cleanupFilesForParent(parentId){
  deleteFilesForParent(parentId);
}

// ==================== Dashboard ====================
function renderDashboard(){
  var sid=getCurrentSemesterId();
  var curSubjects=getCurrentSubjects();
  var allKps=getAllKnowledgePoints(true);
  var curExams=exams.filter(function(e){return e.semesterId===sid&&!e.isCompleted;});
  var curWA=wrongAnswers.filter(function(w){return w.semesterId===sid;});
  var curPapers=examPapers.filter(function(p){return p.semesterId===sid;});
  var curAs=assignments.filter(function(a){return a.semesterId===sid&&a.status!=='已提交'&&a.status!=='已批改';});
  var totalKP=allKps.length;
  var masteredKP=allKps.filter(function(k){return k.masteryLevel>=4;}).length;
  var dueWrong=curWA.filter(function(w){return !w.mastered&&w.nextReviewDate<=today();})
    .sort(function(a,b){return a.masteryLevel-b.masteryLevel;});

  // Today's review recommendations
  var recHTML='';
  if(dueWrong.length===0){
    recHTML='<div class="empty-state"><div class="empty-icon">🎉</div><p>暂无待复习错题！</p></div>';
  }else{
    var recs=dueWrong.slice(0,10);
    recHTML=recs.map(function(w){
      var kpNames=(w.linkedKnowledgePointIds||[]).map(function(id){return (getKnowledgePointById(id)?.content)||'未知';}).join('、');
      var overdue=daysBetween(w.nextReviewDate,today());
      return '<div class="card" style="padding:10px 14px;">'+
        '<div style="display:flex;justify-content:space-between;flex-wrap:wrap;">'+
        '<span><span class="stars">'+'★'.repeat(w.masteryLevel||1)+'☆'.repeat(5-(w.masteryLevel||1))+'</span> '+escapeHtml(w.question).substring(0,40)+'...</span>'+
        '<span style="font-size:.75rem;color:var(--text-secondary);">📝错题 ⏰'+(overdue>0?'超期'+overdue+'天':'今日')+'</span></div>'+
        '<div class="text-secondary">📌 '+kpNames+' '+(w.textbookRef?'📖'+w.textbookRef:'')+'</div></div>';
    }).join('');
  }

  // Exam countdown
  var examHTML='';
  if(curExams.length===0){examHTML='<div class="empty-state"><p>暂无考试安排</p><button class="btn btn-primary btn-sm mt-8" onclick="switchTab(\'exams\')">📅 添加考试</button></div>';}
  else{
    examHTML=curExams.sort(function(a,b){return new Date(a.examDate)-new Date(b.examDate);}).map(function(e){
      var remaining=daysBetween(today(),e.examDate);
      var subj=getSubjectById(e.subjectId);
      var kpCount=allKps.filter(function(k){return k.subjectId===e.subjectId;}).length;
      var urgency=remaining<=3?'🔴':remaining<=7?'🟡':'🟢';
      var overdue=remaining<0;
      return '<div class="card" style="padding:10px 14px;'+(overdue||remaining<=3?'border-left:3px solid var(--accent-red);':'')+'"><strong>'+urgency+' '+escapeHtml(e.title)+'</strong> '+
        '<span class="tag tag-gray">'+escapeHtml(e.examType||'')+'</span>'+
        '<div class="text-secondary">📅 '+e.examDate+' | ⏰ '+(overdue?'<span style="color:var(--accent-red);">已超期 <strong>'+Math.abs(remaining)+'</strong> 天</span>':'还剩 <strong>'+remaining+'</strong> 天')+' | 📚 '+(subj?.name||'未知')+' ('+kpCount+'个知识点)</div>'+
        (e.notes?'<div class="text-secondary">💬 '+escapeHtml(e.notes)+'</div>':'')+'</div>';
    }).join('');
    examHTML+='<button class="btn btn-sm btn-outline mt-8" style="width:100%;" onclick="switchTab(\'exams\')">📅 管理考试</button>';
  }

  // High frequency TOP 10
  var kpFreq=allKps.filter(function(k){return k.examFrequency>0;})
    .sort(function(a,b){return b.examFrequency-a.examFrequency;}).slice(0,10);
  var freqHTML='';
  if(kpFreq.length===0){freqHTML='<div class="empty-state"><p>暂无考频数据，请先录入真题</p></div>';}
  else{
    freqHTML=kpFreq.map(function(k,i){
      var pct=Math.round(k.examFrequency/kpFreq[0].examFrequency*100);
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return '<div style="margin:4px 0;"><span>'+medal+' '+escapeHtml(k.content)+' ('+k.examFrequency+'次)</span> '+
        '<span class="text-secondary">'+k.subjectName+'·'+k.chapterTitle+'</span>'+
        '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;"></div></div></div>';
    }).join('');
  }

  // GPA
  var gpaHTML='';
  var subjScores=[];
  for(var i=0;i<curSubjects.length;i++){
    var s=curSubjects[i];
    var sp=curPapers.filter(function(p){return p.subjectId===s.id;});
    var tw=0,tt=0;
    for(var j=0;j<sp.length;j++){
      if(sp[j].myScore!=null&&sp[j].weight){tw+=sp[j].myScore/sp[j].totalScore*100*sp[j].weight;tt+=sp[j].weight;}
    }
    if(tt>0)subjScores.push({name:s.name,score:Math.round(tw/tt),weight:tt});
  }
  if(subjScores.length===0){gpaHTML='<div class="empty-state"><p>暂无成绩数据</p></div>';}
  else{gpaHTML=subjScores.map(function(s){return '<div>📖 '+escapeHtml(s.name)+': <strong>'+s.score+'</strong> 分 (权重'+Math.round(s.weight*100)+'%)</div>';}).join('');}

  // Stats
  var statHTML='<div class="stats-row">'+
    '<div class="stat-card"><div class="stat-num">'+curSubjects.length+'</div><div class="stat-label">科目</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+totalKP+'</div><div class="stat-label">知识点</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+examQuestions.filter(function(q){return q.semesterId===sid;}).length+'</div><div class="stat-label">真题</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+curPapers.length+'</div><div class="stat-label">试卷</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+curWA.length+'</div><div class="stat-label">错题</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(totalKP?Math.round(masteredKP/totalKP*100):0)+'%</div><div class="stat-label">掌握率</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+curAs.filter(function(a){return a.status==='进行中'||a.status==='待开始';}).length+'</div><div class="stat-label">待交作业</div></div></div>';

  // Guide card

function renderChapters(){

function renderSubjectTree(subs){
  if(subs.length===0)return'<div class="empty-state"><p>暂无科目，请添加</p></div>';
  return subs.map(function(s){
    var chCount=(s.chapters||[]).length;
    var kpCount=0;
    (s.chapters||[]).forEach(function(c){kpCount+=(c.knowledgePoints||[]).length;});
    return '<div><div class="tree-item" style="display:flex;align-items:center;gap:6px;font-weight:600;" onclick="toggleTree(this)">'+
      '<span class="tree-toggle">▶</span>'+
      '<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+(s.color||'#888')+';flex-shrink:0;"></span> '+
      escapeHtml(s.name)+' <span class="text-secondary">'+chCount+'章·'+kpCount+'知识点</span>'+
      '<span style="flex:1;"></span>'+
      '<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openSubjectModal(\''+s.id+'\')">✏️</button>'+
      '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteSubjectConfirm(\''+s.id+'\')">🗑</button></div>'+
      '<div class="tree-children">'+
      '<button class="btn btn-sm btn-outline mt-8 mb-8" onclick="openChapterModal(\''+s.id+'\')">➕ 添加章节</button>'+
      '<button class="btn btn-sm btn-outline mt-8 mb-8" style="color:var(--accent-purple);border-color:var(--accent-purple);" onclick="openTextbookParserModal(\''+s.id+'\')">📖 上传课本解析</button>'+
      (s.chapters||[]).map(function(c){
        return '<div class="tree-item" onclick="event.stopPropagation();selectChapter(\''+s.id+'\',\''+c.id+'\')" data-subject="'+s.id+'" data-chapter="'+c.id+'">📖 '+escapeHtml(c.title)+
          '<span class="text-secondary">('+(c.knowledgePoints||[]).length+'个知识点)</span>'+
          (c.textbookPageRange?'<span class="tag tag-blue">'+escapeHtml(c.textbookPageRange)+'</span>':'')+'</div>';
      }).join('')+'</div></div>';
  }).join('');
}

function toggleTree(el){
  var children=el.nextElementSibling;
  var toggle=el.querySelector('.tree-toggle');
  children.classList.toggle('open');
  toggle.textContent=children.classList.contains('open')?'▼':'▶';
}

function selectChapter(subjectId,chapterId){
  var s=getSubjectById(subjectId);
  var chapter=getChapterById(s,chapterId);
  if(!chapter)return;
  var panel=document.getElementById('chapterDetailPanel');
  if(!panel)return;
  var kps=chapter.knowledgePoints||[];
  var kpHTML='';
  kps.forEach(function(kp){
    var tagsHTML=(kp.tags||[]).map(function(t){
      var cls=t==='高频考点'?'tag-red':t==='重点'?'tag-orange':t==='难点'?'tag-blue':'tag-gray';
      return '<span class="tag '+cls+'" onclick="event.stopPropagation();filterKPTags(\''+t+'\')">'+escapeHtml(t)+'</span>';
    }).join('');
    var masteryStars='★'.repeat(kp.masteryLevel||0)+'☆'.repeat(5-(kp.masteryLevel||0));
    kpHTML+='<div class="card" style="padding:10px 14px;">'+
      '<div style="font-weight:600;margin-bottom:4px;">'+escapeHtml(kp.content)+'</div>'+tagsHTML+
      (kp.notes?'<div class="text-secondary mt-8">💬 '+escapeHtml(kp.notes)+'</div>':'')+
      '<div class="text-secondary gap-8 mt-8">'+
      '<span>⭐ 掌握度: <span class="stars" style="cursor:pointer;" onclick="cycleMasteryLevel(\''+kp.id+'\',event)">'+masteryStars+'</span></span>'+
      (kp.textbookRef?'<span>📖 '+escapeHtml(kp.textbookRef)+'</span>':'')+
      (kp.materialRef?'<span>📄 '+escapeHtml(kp.materialRef)+'</span>':'')+
      '<span>📋 考频: '+(kp.examFrequency||0)+'次</span>'+
      (kp.linkedFlashcardId?'<span>🃏 有闪卡</span>':'')+'</div>'+
      '<div class="mt-8">'+
      '<button class="btn btn-sm btn-outline" onclick="openKnowledgePointModal(\''+subjectId+'\',\''+chapterId+'\',\''+kp.id+'\')">✏️ 编辑</button>'+
      '<button class="btn btn-sm btn-outline" onclick="toggleMastered(\''+kp.id+'\')">'+(kp.mastered?'✅ 已掌握':'⬜ 标记掌握')+'</button>'+
      '<button class="btn btn-sm btn-danger" onclick="deleteKnowledgePointConfirm(\''+kp.id+'\')">🗑 删除</button></div></div>';
  });
  panel.innerHTML='<div class="card-header"><span class="card-title">📖 '+escapeHtml(chapter.title)+'</span>'+
    (chapter.textbookPageRange?'<span class="tag tag-blue">'+escapeHtml(chapter.textbookPageRange)+'</span>':'')+'</div>'+
    '<div class="mb-8" style="display:flex;gap:8px;flex-wrap:wrap;">'+
    '<button class="btn btn-primary btn-sm" onclick="openKnowledgePointModal(\''+subjectId+'\',\''+chapterId+'\')">➕ 添加知识点</button>'+
    '<button class="btn btn-outline btn-sm" onclick="openChapterModal(\''+subjectId+'\',\''+chapterId+'\')">✏️ 编辑章节</button>'+
    '<button class="btn btn-sm btn-outline" style="color:var(--accent-purple);border-color:var(--accent-purple);" onclick="openTextbookParserModal(\''+subjectId+'\')">📖 课本解析</button>'+
    '<button class="btn btn-sm btn-outline tag-red" onclick="filterKPTags(\'高频考点\')">只看高频</button>'+
    '<button class="btn btn-sm btn-outline tag-orange" onclick="filterKPTags(\'重点\')">只看重点</button>'+
    '<button class="btn btn-sm btn-outline tag-blue" onclick="filterKPTags(\'难点\')">只看难点</button></div>'+
    '<div id="kpList">'+(kpHTML||'<div class="empty-state"><p>暂无知识点</p></div>')+'</div>';
  // Highlight active in tree
  var allItems=document.querySelectorAll('#subjectTree .tree-item');
  for(var i=0;i<allItems.length;i++)allItems[i].classList.remove('active');
  var targetEl=document.querySelector('#subjectTree .tree-item[data-chapter="'+chapterId+'"]');
  if(targetEl)targetEl.classList.add('active');
}

function filterKPTags(tag){
  var cards=document.querySelectorAll('#kpList .card');
  if(!cards)return;
  for(var i=0;i<cards.length;i++){
    if(!cards[i].textContent.includes(tag))cards[i].style.display='none';
    else cards[i].style.display='';
  }
}

function openSubjectModal(subjectId){
  var s=subjectId?getSubjectById(subjectId):null;

function saveSubject(subjectId){
  var name=document.getElementById('subjName').value.trim();
  var color=document.getElementById('subjColor').value;

    var s=getSubjectById(subjectId);
    if(s){s.name=name;s.color=color;}
  }else{
    subjects.push({id:genId(),semesterId:getCurrentSemesterId(),name:name,color:color,chapters:[]});
  }
  saveData(KEYS.subjects,subjects);
  closeModal();refreshCurrentTab();
  showToast('科目已保存','success');
}

function deleteSubjectConfirm(subjectId){

    refreshCurrentTab();showToast('科目已删除','info');

function openChapterModal(subjectId,chapterId){
  var s=getSubjectById(subjectId);
  var c=chapterId?getChapterById(s,chapterId):null;
  var html='<div class="modal-header">'+(c?'✏️ 编辑章节':'➕ 添加章节')+' — '+escapeHtml(s?.name||'')+' <button class="modal-close" onclick="closeModal()">✕</button></div>';
  html+='<div class="form-group"><label>章节标题</label><input id="chapTitle" value="'+(c?escapeHtml(c.title):'')+'" placeholder="如: 第一章 鸦片战争"></div>';

function saveChapter(subjectId,chapterId){
  var title=document.getElementById('chapTitle').value.trim();
  var pageRange=document.getElementById('chapPageRange').value.trim();
  if(!title){showToast('请输入章节标题','error');return;}
  var s=getSubjectById(subjectId);if(!s)return;
  if(!s.chapters)s.chapters=[];
  if(chapterId){
    var c=getChapterById(s,chapterId);
    if(c){c.title=title;c.textbookPageRange=pageRange;}
  }else{
    s.chapters.push({id:genId(),title:title,textbookPageRange:pageRange,knowledgePoints:[]});
  }
  saveData(KEYS.subjects,subjects);
  closeModal();refreshCurrentTab();
  showToast('章节已保存','success');
}

function openKnowledgePointModal(subjectId,chapterId,kpId){
  var s=getSubjectById(subjectId);
  var c=getChapterById(s,chapterId);
  var kp=kpId?(c?.knowledgePoints||[]).find(function(k){return k.id===kpId;}):null;
  var newKpId=kpId||genId();
  var allTagOptions=['高频考点','重点','难点','易混淆','基础概念','必背','常考'];
  var checkboxes=allTagOptions.map(function(t){
    return '<label class="checkbox-item"><input type="checkbox" value="'+t+'" '+(kp&&(kp.tags||[]).includes(t)?'checked':'')+'>'+t+'</label>';
  }).join('');
  var html='<div class="modal-header">'+(kp?'✏️ 编辑知识点':'➕ 添加知识点')+' <button class="modal-close" onclick="closeModal()">✕</button></div>';
  html+='<div style="color:var(--text-secondary);margin-bottom:8px;">'+escapeHtml(s?.name||'')+' > '+escapeHtml(c?.title||'')+'</div>';
  html+='<div class="form-group"><label>知识点内容</label><textarea id="kpContent" placeholder="描述这个知识点...">'+(kp?escapeHtml(kp.content):'')+'</textarea></div>';
  html+='<div class="form-group"><label>标签（可多选）</label><div class="checkbox-group">'+checkboxes+'</div></div>';
  html+='<div class="form-group"><label>自定义标签（逗号分隔）</label><input id="kpCustomTags" value="'+(kp?((kp.tags||[]).filter(function(t){return !allTagOptions.includes(t);}).join(',')):'')+'" placeholder="如: 时间线,人物"></div>';
  html+='<div class="form-group"><label>备注</label><textarea id="kpNotes" placeholder="补充说明...">'+(kp?escapeHtml(kp.notes||''):'')+'</textarea></div>';
  html+='<div class="form-row"><div class="form-group"><label>课本页码</label><input id="kpTextbookRef" value="'+(kp?escapeHtml(kp.textbookRef||''):'')+'" placeholder="如: 课本 P44"></div><div class="form-group"><label>资料页码</label><input id="kpMaterialRef" value="'+(kp?escapeHtml(kp.materialRef||''):'')+'" placeholder="如: 复习笔记第3页"></div></div>';
  if(kp){html+='<div class="form-group"><label>掌握程度</label><input type="range" id="kpMasteryLevel" min="0" max="5" value="'+(kp.masteryLevel||0)+'" style="width:100%;"> <span id="kpMasteryLabel">'+'★'.repeat(kp.masteryLevel||0)+'☆'.repeat(5-(kp.masteryLevel||0))+'</span></div>';}
  html+=fileUploaderFormHTML(newKpId,kp?.attachmentIds||[]);
  html+='<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveKnowledgePoint(\''+subjectId+'\',\''+chapterId+'\',\''+(kpId||'')+'\',\''+newKpId+'\')">💾 保存</button></div>';
  showModal(html);
  if(kp){document.getElementById('kpMasteryLevel')?.addEventListener('input',function(){document.getElementById('kpMasteryLabel').textContent='★'.repeat(parseInt(this.value))+'☆'.repeat(5-parseInt(this.value));});}
  initFileUploader(newKpId,kp?.attachmentIds||[]);
}

function saveKnowledgePoint(subjectId,chapterId,kpId,newKpId){
  var content=document.getElementById('kpContent').value.trim();
  if(!content){showToast('请输入知识点内容','error');return;}
  var s=getSubjectById(subjectId);var c=getChapterById(s,chapterId);
  if(!s||!c)return;
  if(!c.knowledgePoints)c.knowledgePoints=[];
  var checkboxes=document.querySelectorAll('#globalModal .checkbox-group input[type=checkbox]:checked');
  var checkedTags=Array.from(checkboxes).map(function(cb){return cb.value;});
  var customTags=(document.getElementById('kpCustomTags')?.value||'').split(',').map(function(t){return t.trim();}).filter(Boolean);
  var tags=checkedTags.concat(customTags);
  var notes=document.getElementById('kpNotes')?.value||'';
  var textbookRef=document.getElementById('kpTextbookRef')?.value||'';
  var materialRef=document.getElementById('kpMaterialRef')?.value||'';
  var masteryLevel=parseInt(document.getElementById('kpMasteryLevel')?.value||'0');
  var attachmentIds=getAttachmentIdsFromForm(newKpId);
  if(kpId){
    var kp=c.knowledgePoints.find(function(k){return k.id===kpId;});
    if(kp){kp.content=content;kp.tags=tags;kp.notes=notes;kp.textbookRef=textbookRef;kp.materialRef=materialRef;kp.masteryLevel=masteryLevel;kp.attachmentIds=attachmentIds;}
  }else{
    c.knowledgePoints.push({id:newKpId,content:content,tags:tags,notes:notes,mastered:false,masteryLevel:masteryLevel,textbookRef:textbookRef,materialRef:materialRef,examFrequency:0,linkedExamQuestionIds:[],linkedExamPaperQuestionIds:[],linkedFlashcardId:null,attachmentIds:attachmentIds});
  }
  saveData(KEYS.subjects,subjects);
  closeModal();selectChapter(subjectId,chapterId);
  showToast('知识点已保存','success');
}

function cycleMasteryLevel(kpId,event){
  event.stopPropagation();
  for(var i=0;i<subjects.length;i++){for(var j=0;j<(subjects[i].chapters||[]).length;j++){var kps=subjects[i].chapters[j].knowledgePoints||[];for(var k=0;k<kps.length;k++){if(kps[k].id===kpId){kps[k].masteryLevel=(kps[k].masteryLevel||0)>=5?0:(kps[k].masteryLevel||0)+1;kps[k].mastered=kps[k].masteryLevel>=4;}}}}
  saveData(KEYS.subjects,subjects);refreshCurrentTab();
}

function toggleMastered(kpId){
  for(var i=0;i<subjects.length;i++){for(var j=0;j<(subjects[i].chapters||[]).length;j++){var kps=subjects[i].chapters[j].knowledgePoints||[];for(var k=0;k<kps.length;k++){if(kps[k].id===kpId){kps[k].mastered=!kps[k].mastered;if(kps[k].mastered)kps[k].masteryLevel=Math.max(kps[k].masteryLevel||0,4);else kps[k].masteryLevel=Math.min(kps[k].masteryLevel||1,3);}}}}
  saveData(KEYS.subjects,subjects);refreshCurrentTab();
}

function deleteKnowledgePointConfirm(kpId){
  showConfirm('删除知识点','确定删除这个知识点吗？',function(){
    for(var i=0;i<subjects.length;i++){for(var j=0;j<(subjects[i].chapters||[]).length;j++){subjects[i].chapters[j].knowledgePoints=(subjects[i].chapters[j].knowledgePoints||[]).filter(function(k){if(k.id===kpId){cleanupFilesForParent(kpId);return false;}return true;});}}
    saveData(KEYS.subjects,subjects);refreshCurrentTab();
    showToast('知识点已删除','info');
  });
}

function openTextbookParserModal(subjectId){

    previewHTML+='</div>';
  });
  previewEl.innerHTML=previewHTML;applyBtn.style.display='inline-flex';

function parseTextbookContent(text){
  var lines=text.split(/[\n\r]+/).map(function(l){return l.trim();}).filter(Boolean);
  var chapters=[];
  var currentChapter=null;
  var chapterRegex=/^(?:第\s*(?:[一二三四五六七八九十\d]+)\s*章|Chapter\s*\d+)\s*[：:\s]?\s*(.*)/i;
  var pageRegex=/[Pp]\s*\.?\s*(\d+)\s*[-–—]\s*[Pp]?\s*\.?\s*(\d+)|[Pp]\s*\.?\s*(\d+)/;
  var kpRegex=/^[\-\•\*\d]+[\.\、\)\s]\s*(.+)/;
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    var chMatch=line.match(chapterRegex);
    if(chMatch){
      var title=chMatch[1]?chMatch[1].trim():line.trim();
      var pageRange='';
      var pgMatch=line.match(pageRegex);
      if(pgMatch)pageRange=pgMatch[0];
      if(!title.includes('章'))title='第'+(chapters.length+1)+'章 '+title;
      currentChapter={title:title,pageRange:pageRange,knowledgePoints:[]};
      chapters.push(currentChapter);
      continue;
    }
    if(currentChapter){
      var kpMatch=line.match(kpRegex);
      if(kpMatch){currentChapter.knowledgePoints.push(kpMatch[1].trim());}
      else if(line.length<=60&&line.indexOf('//')!==0&&line.indexOf('#')!==0){currentChapter.knowledgePoints.push(line);}
    }
  }
  for(var i=0;i<chapters.length;i++){chapters[i].knowledgePoints=chapters[i].knowledgePoints.filter(function(k){return k.length<=80;});}
  return {chapters:chapters,totalKPs:chapters.reduce(function(sum,ch){return sum+ch.knowledgePoints.length;},0)};
}

function applyParsedTextbook(subjectId){
  var text=document.getElementById('textbookTextArea')?.value.trim();
  if(!text)return;
  var parsed=parseTextbookContent(text);
  if(parsed.chapters.length===0){showToast('未识别到章节','error');return;}
  var s=getSubjectById(subjectId);if(!s)return;
  if(!s.chapters)s.chapters=[];
  var sid=getCurrentSemesterId();var sname=s.name;
  var createdChapters=0,createdKPs=0,createdKBs=0,skipped=0;
  parsed.chapters.forEach(function(ch){
    var existingChapter=s.chapters.find(function(c){return c.title===ch.title;});
    if(existingChapter){
      skipped++;if(!existingChapter.knowledgePoints)existingChapter.knowledgePoints=[];
      ch.knowledgePoints.forEach(function(kpContent){
        if(!existingChapter.knowledgePoints.find(function(k){return k.content===kpContent;})){
          existingChapter.knowledgePoints.push({id:genId(),content:kpContent,tags:['重点'],notes:'从课本目录自动解析补充',mastered:false,masteryLevel:0,textbookRef:ch.pageRange||existingChapter.textbookPageRange||'',materialRef:'',examFrequency:0,linkedExamQuestionIds:[],linkedExamPaperQuestionIds:[],linkedFlashcardId:null,attachmentIds:[]});
          createdKPs++;
        }
      });
    }else{
      var chapterId=genId();
      var kps=ch.knowledgePoints.map(function(kpContent){return {id:genId(),content:kpContent,tags:['重点'],notes:'从课本目录自动解析',mastered:false,masteryLevel:0,textbookRef:ch.pageRange||'',materialRef:'',examFrequency:0,linkedExamQuestionIds:[],linkedExamPaperQuestionIds:[],linkedFlashcardId:null,attachmentIds:[]};});
      s.chapters.push({id:chapterId,title:ch.title,textbookPageRange:ch.pageRange||'',knowledgePoints:kps});
      createdChapters++;createdKPs+=kps.length;
    }
    // Sync to KB
    var kbTitle=sname+' - '+ch.title;
    if(!knowledgeBase.find(function(k){return k.semesterId===sid&&k.subjectId===subjectId&&k.title===kbTitle;})){
      knowledgeBase.push({id:genId(),semesterId:sid,subjectId:subjectId,title:kbTitle,content:ch.title+'知识点汇总：\n\n'+ch.knowledgePoints.map(function(kp){return '· '+kp;}).join('\n'),tags:['课本解析','章节汇总',sname],linkedChapterIds:[],linkedKnowledgePointIds:[],attachmentIds:[],createdAt:today(),updatedAt:today()});
      createdKBs++;
    }
    ch.knowledgePoints.forEach(function(kpContent){
      var kpTitle=kpContent.length>40?kpContent.substring(0,40)+'...':kpContent;
      if(!knowledgeBase.find(function(k){return k.semesterId===sid&&k.subjectId===subjectId&&k.title===kpTitle;})){
        knowledgeBase.push({id:genId(),semesterId:sid,subjectId:subjectId,title:kpTitle,content:kpContent,tags:['知识点',sname],linkedChapterIds:[],linkedKnowledgePointIds:[],attachmentIds:[],createdAt:today(),updatedAt:today()});
        createdKBs++;
      }
    });
  });
  saveData(KEYS.subjects,subjects);saveData(KEYS.knowledgeBase,knowledgeBase);
  closeModal();refreshCurrentTab();
  var msg='✅ 导入了 '+createdChapters+' 章、'+createdKPs+' 知识点、'+createdKBs+' 知识库条目';
  if(skipped>0)msg+=' | ⏭️ 跳过'+skipped+'个重复';
  showToast(msg,'success');
}

function savePaperQuestion(epId,qId){
  var ep=examPapers.find(function(p){return p.id===epId;});if(!ep)return;if(!ep.questions)ep.questions=[];
  var qData={id:qId||genId(),questionNumber:parseInt(document.getElementById('pqNumber').value)||1,questionType:document.getElementById('pqType').value,score:parseInt(document.getElementById('pqScore').value)||0,myScore:parseInt(document.getElementById('pqMyScore').value)||0,questionContent:document.getElementById('pqContent').value.trim(),options:(document.getElementById('pqOptions').value.trim()||'').split('\n').filter(Boolean),myAnswer:document.getElementById('pqMyAnswer').value.trim(),correctAnswer:document.getElementById('pqCorrectAnswer').value.trim(),isCorrect:document.getElementById('pqIsCorrect')?.checked||false,linkedKnowledgePointIds:Array.from((document.getElementById('pqKPs')||{selectedOptions:[]}).selectedOptions).map(function(o){return o.value;}),textbookRef:document.getElementById('pqTextbookRef').value.trim(),materialRef:document.getElementById('pqMaterialRef').value.trim(),syncedToWrongBook:false};
  if(qId){var idx=ep.questions.findIndex(function(q){return q.id===qId;});if(idx>=0)ep.questions[idx]=qData;}
  else{ep.questions.push(qData);}
  ep.myScore=ep.questions.reduce(function(s,q){return s+(q.myScore||0);},0);
  saveData(KEYS.examPapers,examPapers);closeModal();openExamPaperModal(epId);showToast('题目已保存','success');
}
function deletePaperQuestion(epId,qId){
  var ep=examPapers.find(function(p){return p.id===epId;});if(!ep)return;
  ep.questions=(ep.questions||[]).filter(function(q){return q.id!==qId;});
  ep.myScore=ep.questions.reduce(function(s,q){return s+(q.myScore||0);},0);
  saveData(KEYS.examPapers,examPapers);openExamPaperModal(epId);showToast('题目已删除','info');
}
function syncWrongAnswers(epId){
  var ep=examPapers.find(function(p){return p.id===epId;});if(!ep)return;
  var wqs=(ep.questions||[]).filter(function(q){return !q.isCorrect&&!q.syncedToWrongBook;});
  if(wqs.length===0){showToast('没有待同步的错题','info');return;}
  wqs.forEach(function(q){var iv=[1,2,4,7,14,30];wrongAnswers.push({id:genId(),semesterId:ep.semesterId,subjectId:ep.subjectId,question:q.questionContent||'',myAnswer:q.myAnswer||'',correctAnswer:q.correctAnswer||'',errorReason:'从试卷同步',errorType:'知识遗漏',masteryLevel:1,questionType:q.questionType,sourceType:'examPaper',sourceExamPaperId:ep.id,sourceExamPaperTitle:ep.title,linkedKnowledgePointIds:q.linkedKnowledgePointIds||[],textbookRef:q.textbookRef||'',materialRef:q.materialRef||'',tags:['试卷错题'],reviewCount:0,lastReviewedAt:null,nextReviewDate:new Date(Date.now()+86400000).toISOString().split('T')[0],createdAt:today(),attachmentIds:[],starCount:0});q.syncedToWrongBook=true;});

function deleteExamPaperConfirm(epId){

function renderWrongAnswerList(was){
  if(was.length===0)return'<div class="empty-state"><div class="empty-icon">🎉</div><p>暂无错题</p></div>';
  return was.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);}).map(function(w){
    var kpNames=(w.linkedKnowledgePointIds||[]).map(function(id){return (getKnowledgePointById(id)?.content)||'未知';}).join('、');
    var overdue=daysBetween(w.nextReviewDate,today());
    var starB=w.starCount>0?'<span class="tag tag-red" title="累计错'+(w.starCount+1)+'次">⭐'+(w.starCount+1)+'次</span>':'';
    var paperB=w.sourceExamPaperId?'<span class="tag tag-purple">📑试卷</span>':'';
    return '<div class="card"><div class="card-header"><span><span class="tag tag-gray">'+(w.questionType||'未知')+'</span><span class="tag tag-gray">'+(getSubjectById(w.subjectId)?.name||'')+'</span>'+starB+paperB+'</span><span class="text-secondary">📅 '+w.createdAt+'</span></div>'+
      '<div class="card-title">Q: '+escapeHtml(w.question)+'</div>'+
      (w.myAnswer?'<div>❌ 我的答案: <span class="highlight-red">'+escapeHtml(w.myAnswer)+'</span></div>':'')+
      '<div>✅ 正确答案: <span class="highlight-green">'+escapeHtml(w.correctAnswer)+'</span></div>'+
      (w.errorReason?'<div class="mt-8">💡 错误原因: '+escapeHtml(w.errorReason)+'</div>':'')+
      (w.errorType?'<div class="mt-8">🏷 错误类型: <span class="tag tag-orange">'+escapeHtml(w.errorType)+'</span></div>':'')+
      '<div class="mt-8">⭐ 掌握程度: <span class="stars" style="cursor:pointer;" onclick="changeWrongAnswerMastery(\''+w.id+'\',event)">'+'★'.repeat(w.masteryLevel||1)+'☆'.repeat(5-(w.masteryLevel||1))+'</span></div>'+
      '<div class="text-secondary gap-8 mt-8"><span>📌 '+kpNames+'</span>'+(w.textbookRef?'<span>📖 '+escapeHtml(w.textbookRef)+'</span>':'')+'</div>'+
      '<div class="text-secondary mt-8">🔄 已复习 '+(w.reviewCount||0)+'次 | ⏰ 下次: '+w.nextReviewDate+' '+(overdue>0?'<span style="color:var(--accent-red);">(超期'+overdue+'天)</span>':'')+'</div>'+
      '<div class="mt-8"><button class="btn btn-sm btn-outline" onclick="reviewWrongAnswer(\''+w.id+'\')">🔄 复习</button><button class="btn btn-sm btn-outline" onclick="openWrongAnswerModal(\''+w.id+'\')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteWrongAnswerConfirm(\''+w.id+'\')">🗑</button></div></div>';
  }).join('');
}
function rerenderWrongAnswers(){
  var was=wrongAnswers.filter(function(w){return w.semesterId===getCurrentSemesterId();});
  var sf=document.getElementById('waFilterSubject')?.value;var mf=document.getElementById('waFilterMastery')?.value;
  var ef=document.getElementById('waFilterErrorType')?.value;var due=document.getElementById('waDueOnly')?.checked;
  var s=document.getElementById('waSearch')?.value?.toLowerCase();
  if(sf)was=was.filter(function(w){return w.subjectId===sf;});
  if(mf)was=was.filter(function(w){return (w.masteryLevel||1)===parseInt(mf);});
  if(ef)was=was.filter(function(w){return w.errorType===ef;});
  if(due)was=was.filter(function(w){return w.nextReviewDate<=today();});

  var c=document.getElementById('waListContainer');if(c)c.innerHTML=renderWrongAnswerList(was);

function renderAssignments(){
  var sid=getCurrentSemesterId();var curSubjects=getCurrentSubjects();
  var as=assignments.filter(function(a){return a.semesterId===sid;});
  var fHTML='<div class="filter-bar"><select id="asFilterSubject" onchange="rerenderAssignments()"><option value="">全部科目</option>'+curSubjects.map(function(s){return '<option value="'+s.id+'">'+escapeHtml(s.name)+'</option>';}).join('')+'</select><select id="asFilterStatus" onchange="rerenderAssignments()"><option value="">全部状态</option><option value="待开始">待开始</option><option value="进行中">进行中</option><option value="已提交">已提交</option><option value="已批改">已批改</option></select></div>';

  as.forEach(function(a){if(a.status==='已提交'||a.status==='已批改')g.done.push(a);else if(daysBetween(today(),a.deadline)<=3)g.due.push(a);else g.progress.push(a);});

  return '<div class="section-title">📎 作业/论文</div><button class="btn btn-primary mb-8" onclick="openAssignmentModal()">➕ 添加作业</button>'+fHTML+(g.due.length>0?'<div class="section-title mt-8">⚠️ 即将截止/已超期</div>'+g.due.sort(function(a,b){return new Date(a.deadline)-new Date(b.deadline);}).map(renderA).join(''):'')+(g.progress.length>0?'<div class="section-title mt-8">📋 进行中</div>'+g.progress.map(renderA).join(''):'')+(g.done.length>0?'<div class="section-title mt-8">✅ 已完成</div>'+g.done.map(renderA).join(''):'')+(as.length===0?'<div class="empty-state"><div class="empty-icon">📎</div><p>暂无作业</p></div>':'');
}

var flashcardReviewMode=false,flashcardQueue=[],flashcardIndex=0;

  return '<div class="section-title">🃏 闪卡记忆</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"><button class="btn btn-primary btn-sm" onclick="openFlashcardModal()">➕ 新建闪卡</button>'+(kbCount>0?'<button class="btn btn-outline btn-sm" onclick="openKBFlashcardPicker()">📚 从知识库生成</button>':'')+'<button class="btn btn-primary btn-sm" onclick="startFlashcardReview()" '+(fcs.filter(function(f){return !f.mastered;}).length===0?'disabled':'')+'>▶️ 开始复习 ('+fcs.filter(function(f){return !f.mastered;}).length+'张)</button></div><div class="stats-row"><div class="stat-card"><div class="stat-num">'+fcs.length+'</div><div class="stat-label">总卡片</div></div><div class="stat-card"><div class="stat-num">'+mc+'</div><div class="stat-label">已掌握</div></div><div class="stat-card"><div class="stat-num">'+(fcs.length-mc)+'</div><div class="stat-label">待复习</div></div></div>'+fHTML+'<div id="fcListContainer">'+listHTML+'</div>';
}
function renderFlashcardReviewMode(filterHTML){
  var fc=flashcardQueue[flashcardIndex];if(!fc){flashcardReviewMode=false;return renderFlashcards();}
  return '<div class="section-title">🃏 闪卡复习模式</div><div class="text-secondary mb-8">进度: '+(flashcardIndex+1)+'/'+flashcardQueue.length+' | 📖 '+(getSubjectById(fc.subjectId)?.name||'')+'</div><div class="flashcard-container" onclick="flipFlashcard()"><div class="flashcard-inner" id="flashcardInner"><div class="flashcard-front"><div style="font-size:1.2rem;font-weight:600;">'+escapeHtml(fc.front)+'</div></div><div class="flashcard-back"><div>'+escapeHtml(fc.back)+'</div></div></div></div><div style="text-align:center;margin-top:10px;color:var(--text-secondary);font-size:.8rem;">👆 点击卡片翻转</div><div style="display:flex;gap:12px;justify-content:center;margin-top:16px;"><button class="btn btn-danger" onclick="flashcardResult(false)">❌ 没记住</button><button class="btn btn-primary" onclick="flashcardResult(true)">✅ 记住了</button></div><button class="btn btn-outline btn-sm mt-8" style="display:block;margin:12px auto 0;" onclick="stopFlashcardReview()">退出复习模式</button>';
}
function flipFlashcard(){document.getElementById('flashcardInner')?.classList.toggle('flipped');}
function startFlashcardReview(){
  flashcardQueue=flashcards.filter(function(f){return f.semesterId===getCurrentSemesterId()&&!f.mastered;}).sort(function(a,b){var ao=daysBetween(a.nextReviewDate,today()),bo=daysBetween(b.nextReviewDate,today());return bo*(6-(b.difficulty||1))-ao*(6-(a.difficulty||1));});
  if(flashcardQueue.length===0){showToast('没有待复习的卡片','info');return;}
  flashcardIndex=0;flashcardReviewMode=true;refreshCurrentTab();
}
function stopFlashcardReview(){flashcardReviewMode=false;flashcardQueue=[];flashcardIndex=0;refreshCurrentTab();}
function flashcardResult(ok){
  var fc=flashcardQueue[flashcardIndex];if(!fc)return;fc.reviewCount=(fc.reviewCount||0)+1;fc.lastReviewedAt=today();
  if(ok){fc.difficulty=Math.min((fc.difficulty||1)+1,5);var iv=[1,2,4,7,14,30];fc.nextReviewDate=new Date(Date.now()+iv[Math.min(fc.difficulty-1,5)]*86400000).toISOString().split('T')[0];if(fc.difficulty>=4)fc.mastered=true;}
  else{fc.difficulty=Math.max((fc.difficulty||1)-1,1);fc.nextReviewDate=new Date(Date.now()+86400000).toISOString().split('T')[0];}
  saveData(KEYS.flashcards,flashcards);flashcardIndex++;
  if(flashcardIndex>=flashcardQueue.length){stopFlashcardReview();showToast('🎉 复习完成！','success');return;}
  var inner=document.getElementById('flashcardInner');if(inner)inner.classList.remove('flipped');refreshCurrentTab();
}

var practiceState=null;
function renderPractice(){if(practiceState&&practiceState.questions&&practiceState.questions.length>0)return renderPracticeActive();return renderPracticeSetup();}
function renderPracticeSetup(){

  h+='<button class="btn btn-primary" style="width:100%;" onclick="startPractice()"'+(tot===0?' disabled':'')+'>▶️ 开始刷题'+(tot===0?' (暂无题目)':'')+'</button></div>';return h;
}
function togglePracSource(el){el.classList.toggle('checked');el.querySelector('input').checked=el.classList.contains('checked');}
function startPractice(){
  var sid=getCurrentSemesterId();var subjId=document.getElementById('pracSubject')?.value||'';
  var srcs=Array.from(document.querySelectorAll('#pracSources label.checked')).map(function(el){return el.dataset.source;});
  var count=parseInt(document.getElementById('pracCount')?.value)||0;
  var timed=document.getElementById('pracTimed')?.checked||false;
  if(srcs.length===0){showToast('请选择题目来源','error');return;}
  var pool=[];
  if(srcs.indexOf('wrongAnswers')>=0){wrongAnswers.filter(function(w){return w.semesterId===sid&&(!subjId||w.subjectId===subjId);}).forEach(function(w){pool.push({id:w.id,source:'wrongAnswers',subjectId:w.subjectId,questionType:w.questionType||'选择题',questionContent:w.question,options:[],correctAnswer:w.correctAnswer,explanation:'',linkedKnowledgePointIds:w.linkedKnowledgePointIds||[],textbookRef:w.textbookRef||'',sourceExamPaperId:w.sourceExamPaperId||'',sourceExamPaperTitle:w.sourceExamPaperTitle||''});});}
  if(srcs.indexOf('examQuestions')>=0){examQuestions.filter(function(q){return q.semesterId===sid&&(!subjId||q.subjectId===subjId);}).forEach(function(q){pool.push({id:q.id,source:'examQuestions',subjectId:q.subjectId,questionType:q.questionType,questionContent:q.questionContent,options:q.options||[],correctAnswer:q.correctAnswer,explanation:q.explanation||'',linkedKnowledgePointIds:q.linkedKnowledgePointIds||[],difficulty:q.difficulty});});}
  if(srcs.indexOf('examPapers')>=0){examPapers.filter(function(p){return p.semesterId===sid&&(!subjId||p.subjectId===subjId);}).forEach(function(ep){(ep.questions||[]).forEach(function(q){pool.push({id:q.id,source:'examPapers',subjectId:ep.subjectId,questionType:q.questionType,questionContent:q.questionContent||'',options:q.options||[],correctAnswer:q.correctAnswer||'',explanation:'',linkedKnowledgePointIds:q.linkedKnowledgePointIds||[],textbookRef:q.textbookRef||'',sourceExamPaperId:ep.id,sourceExamPaperTitle:ep.title});});});}
  if(pool.length===0){showToast('没有题目','error');return;}
  pool=shuffleArray(pool);if(count>0&&count<pool.length)pool=pool.slice(0,count);
  practiceState={questions:pool,currentIndex:0,answers:[],startTime:timed?Date.now():null,timerInterval:null,timed:timed};
  refreshCurrentTab();if(timed)startPracticeTimer();
}
function shuffleArray(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function startPracticeTimer(){if(practiceState.timerInterval)clearInterval(practiceState.timerInterval);practiceState.timerInterval=setInterval(function(){var el=document.getElementById('practiceTimer');if(el)el.textContent=formatTime(Math.floor((Date.now()-practiceState.startTime)/1000));},1000);}
function formatTime(s){var m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function renderPracticeActive(){
  var st=practiceState;var q=st.questions[st.currentIndex];var t=st.questions.length;var i=st.currentIndex;
  var ans=st.answers[i];var done=ans!==undefined;var ok=done&&ans.isCorrect;
  var h='<div class="section-title">✍️ 刷题练习</div>';
  if(st.timed){h+='<div class="practice-timer" id="practiceTimer">⏱️ '+formatTime(Math.floor((Date.now()-st.startTime)/1000))+'</div>';}
  h+='<div class="practice-progress"><span>'+(i+1)+'/'+t+'</span><div class="practice-progress-bar"><div class="practice-progress-fill" style="width:'+(i/t*100)+'%;"></div></div></div>';
  var cc=done?(ok?'correct':'wrong'):'';
  h+='<div class="practice-question-card '+cc+'"><div class="practice-q-meta"><span class="tag tag-gray">'+(q.questionType||'选择题')+'</span>'+(q.source==='wrongAnswers'?'<span class="tag tag-orange">错题</span>':'')+(q.source==='examQuestions'?'<span class="tag tag-blue">真题</span>':'')+(q.source==='examPapers'?'<span class="tag tag-purple">试卷:'+escapeHtml(q.sourceExamPaperTitle||'')+'</span>':'')+(q.difficulty?'<span class="tag tag-gray">'+escapeHtml(q.difficulty)+'</span>':'')+'</div>';
  h+='<div class="practice-q-content">'+escapeHtml(q.questionContent)+'</div>';
  if(q.options&&q.options.length>0){h+='<div class="practice-options">';q.options.forEach(function(opt){var oc='';if(done){if(ans.userAnswer===opt&&!ok)oc='wrong-answer';if(q.correctAnswer===opt)oc='correct-answer';}h+='<div class="practice-option '+oc+'" onclick="'+(done?'':'selectPracticeOption(this,\''+escapeHtml(opt).replace(/'/g,'\\\'')+'\')')+'">'+escapeHtml(opt)+'</div>';});h+='</div>';if(!done)h+='<input type="hidden" id="pracSelectedAnswer" value="">';}
  else{h+='<div class="form-group"><textarea id="pracTextAnswer" placeholder="输入你的答案..." '+(done?'disabled':'')+'>'+(done?ans.userAnswer||'':'')+'</textarea></div>';}
  if(done){h+='<div class="mt-8"><strong>'+(ok?'✅ 正确！':'❌ 错误')+'</strong></div>';if(!ok){h+='<div class="text-secondary mt-8">你的：'+escapeHtml(ans.userAnswer||'')+'</div><div style="color:var(--accent-green);">正确：'+escapeHtml(q.correctAnswer||'')+'</div>';}if(q.explanation)h+='<div class="text-secondary mt-8">💡 '+escapeHtml(q.explanation)+'</div>';}
  h+='</div><div style="display:flex;gap:10px;justify-content:center;">';
  if(!done)h+='<button class="btn btn-primary" onclick="submitPracticeAnswer()">✅ 提交</button>';
  else{if(i<t-1)h+='<button class="btn btn-primary" onclick="nextPracticeQuestion()">下一题 →</button>';else h+='<button class="btn btn-primary" onclick="finishPractice()">📊 查看结果</button>';}
  h+='<button class="btn btn-outline" onclick="stopPractice()">退出</button></div>';return h;
}
function selectPracticeOption(el,v){var opts=document.querySelectorAll('.practice-option');for(var i=0;i<opts.length;i++)opts[i].classList.remove('selected');el.classList.add('selected');document.getElementById('pracSelectedAnswer').value=v;}
function submitPracticeAnswer(){
  var st=practiceState;if(!st)return;var q=st.questions[st.currentIndex];var ua='';
  if(q.options&&q.options.length>0){ua=document.getElementById('pracSelectedAnswer')?.value||'';if(!ua){showToast('请选择','error');return;}}
  else{ua=document.getElementById('pracTextAnswer')?.value.trim()||'';if(!ua){showToast('请输入答案','error');return;}}
  st.answers[st.currentIndex]={userAnswer:ua,isCorrect:checkAnswer(ua,q.correctAnswer)};refreshCurrentTab();
}
function checkAnswer(ua,ca){if(!ua||!ca)return false;var u=ua.trim().replace(/\s+/g,' ').toLowerCase();var c=ca.trim().replace(/\s+/g,' ').toLowerCase();if(u===c)return true;if(/^[a-d]$/i.test(u))return c.charAt(0).toLowerCase()===u.toLowerCase();return false;}
function nextPracticeQuestion(){if(!practiceState)return;practiceState.currentIndex++;refreshCurrentTab();}
function stopPractice(){showConfirm('退出刷题','已答题目不会保存，确定退出？',function(){if(practiceState.timerInterval)clearInterval(practiceState.timerInterval);practiceState=null;refreshCurrentTab();});}
function finishPractice(){
  var st=practiceState;if(!st)return;if(st.timerInterval)clearInterval(st.timerInterval);
  var t=st.questions.length;var c=st.answers.filter(function(a){return a&&a.isCorrect;}).length;
  var w=t-c;var sc=t>0?Math.round(c/t*100):0;var el=st.timed?Math.floor((Date.now()-st.startTime)/1000):0;
  var wi=[];st.questions.forEach(function(q,i){var a=st.answers[i];if(a&&!a.isCorrect)wi.push({q:q,ua:a.userAnswer});});
  var scl='score-bad';if(sc>=90)scl='score-excellent';else if(sc>=75)scl='score-good';else if(sc>=60)scl='score-ok';
  var h='<div class="section-title">📊 练习结果</div><div class="card practice-result"><div class="score-circle '+scl+'">'+sc+'%</div><div style="font-size:1.2rem;font-weight:700;margin-bottom:16px;">'+(sc>=90?'🎉 太棒了！':sc>=75?'👍 不错！':sc>=60?'📚 还需努力':'💪 继续加油！')+'</div><div class="practice-result-detail"><div>📋 总题数：<strong>'+t+'</strong></div><div>✅ 正确：<strong style="color:var(--accent-green);">'+c+'</strong></div><div>❌ 错误：<strong style="color:var(--accent-red);">'+w+'</strong></div>'+(st.timed?'<div>⏱️ 用时：<strong>'+formatTime(el)+'</strong></div>':'')+'</div></div>';
  if(wi.length>0){h+='<div class="card mt-8"><div class="card-title mb-8">❌ 答错的题目 ('+wi.length+'道)</div>';wi.forEach(function(item){h+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem;"><div><strong>Q:</strong> '+escapeHtml(item.q.questionContent).substring(0,80)+'...</div><div style="color:var(--accent-red);">你的答案：'+escapeHtml(item.ua)+'</div><div style="color:var(--accent-green);">正确答案：'+escapeHtml(item.q.correctAnswer)+'</div></div>';});h+='<button class="btn btn-primary mt-8" onclick="savePracticeWrongAnswers()">💾 将错题加入错题本</button></div>';}else{h+='<div class="card mt-8"><div class="empty-state"><div class="empty-icon">🎉</div><p>全部正确！</p></div></div>';}
  h+='<div style="text-align:center;margin-top:12px;"><button class="btn btn-outline" onclick="practiceState=null;refreshCurrentTab();">返回选题</button></div>';
  practiceState._wrongItems=wi;practiceState._finished=true;document.getElementById('mainContent').innerHTML=h;
}
function savePracticeWrongAnswers(){
  var st=practiceState;if(!st||!st._wrongItems)return;var sid=getCurrentSemesterId();var added=0,starred=0;
  st._wrongItems.forEach(function(item){var q=item.q;
    var exist=wrongAnswers.find(function(w){return w.semesterId===sid&&w.question===q.questionContent&&w.sourceExamPaperId===q.sourceExamPaperId&&w.sourceExamPaperId!=='';});
    if(exist){exist.starCount=(exist.starCount||0)+1;starred++;}else{var dup=wrongAnswers.find(function(w){return w.semesterId===sid&&w.question===q.questionContent;});if(dup){dup.starCount=(dup.starCount||0)+1;starred++;}else{var iv=[1,2,4,7,14,30];wrongAnswers.push({id:genId(),semesterId:sid,subjectId:q.subjectId,question:q.questionContent,myAnswer:item.ua,correctAnswer:q.correctAnswer||'',errorReason:'刷题练习答错',errorType:'知识遗漏',masteryLevel:1,questionType:q.questionType||'选择题',sourceType:q.source==='examPapers'?'examPaper':'practice',sourceExamPaperId:q.sourceExamPaperId||'',sourceExamPaperTitle:q.sourceExamPaperTitle||'',linkedKnowledgePointIds:q.linkedKnowledgePointIds||[],textbookRef:q.textbookRef||'',materialRef:q.materialRef||'',tags:['刷题错题'],reviewCount:0,lastReviewedAt:null,nextReviewDate:new Date(Date.now()+86400000).toISOString().split('T')[0],createdAt:today(),attachmentIds:[],starCount:0});added++;}}});
  saveData(KEYS.wrongAnswers,wrongAnswers);practiceState=null;refreshCurrentTab();
  var msg='✅ 已添加 '+added+' 道错题';if(starred>0)msg+=' | ⭐ '+starred+' 道重复加星';showToast(msg,'success');
}

// ==================== Export / Import ====================
function exportData(){
  var all={semesters:semesters,subjects:subjects,examQuestions:examQuestions,examPapers:examPapers,wrongAnswers:wrongAnswers,knowledgeBase:knowledgeBase,assignments:assignments,flashcards:flashcards,exams:exams,currentSemesterId:currentSemesterId};
  var blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='学习助手备份_'+today()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('✅ 数据已导出','success');
}
function importData(event){
  var file=event.target.files[0];if(!file)return;var reader=new FileReader();
  reader.onload=function(e){try{var data=JSON.parse(e.target.result);showConfirm('导入数据','将覆盖现有数据，确定导入吗？',function(){if(data.semesters)semesters=data.semesters;if(data.subjects)subjects=data.subjects;if(data.examQuestions)examQuestions=data.examQuestions;if(data.examPapers)examPapers=data.examPapers;if(data.wrongAnswers)wrongAnswers=data.wrongAnswers;if(data.knowledgeBase)knowledgeBase=data.knowledgeBase;if(data.assignments)assignments=data.assignments;if(data.flashcards)flashcards=data.flashcards;if(data.exams)exams=data.exams;if(data.currentSemesterId)currentSemesterId=data.currentSemesterId;saveAll();updateSemesterSelect();refreshCurrentTab();showToast('✅ 数据已导入','success');});}catch(err){showToast('导入失败','error');}};
  reader.readAsText(file);event.target.value='';
}

  initFileDB().then(function(){});
  initSampleData();updateExamFrequency();updateSemesterSelect();
